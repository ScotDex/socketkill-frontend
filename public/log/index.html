<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOCKET.KILL // DAILY_LOGS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap');
        
        body {
            background-color: #050505;
            color: #4ade80;
            font-family: 'Fira Code', monospace;
            overflow-x: hidden;
        }

        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 2px 100%;
            pointer-events: none;
            z-index: 50;
        }

        .terminal-border { border: 1px solid rgba(74, 222, 128, 0.2); }
        .victim-img { filter: sepia(100%) hue-rotate(60deg) brightness(80%) contrast(120%) grayscale(0.5); }
        
        /* Custom Scrollbar for the Manifest List */
        .manifest-scroll::-webkit-scrollbar { width: 4px; }
        .manifest-scroll::-webkit-scrollbar-track { background: #000; }
        .manifest-scroll::-webkit-scrollbar-thumb { background: #166534; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="crt-overlay"></div>

    <header class="mb-8 border-b border-green-900/40 pb-4 flex justify-between items-end">
        <div>
            <h1 class="text-2xl font-bold tracking-tighter">ARCHIVE_RETRIEVAL</h1>
            <p id="log-meta" class="text-[10px] opacity-60 uppercase">Sharded Edge Manifest // No On-Board DB</p>
        </div>
        <div class="flex gap-4">
            <input type="date" id="date-picker" class="bg-black border border-green-900 text-xs p-1 text-green-400 focus:outline-none">
            <button onclick="fetchDailyLog()" class="text-xs bg-green-900/20 px-3 border border-green-900 hover:bg-green-900/40">LOAD_SHARD</button>
        </div>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-12 gap-6 h-[calc(100vh-180px)]">
        
        <section class="lg:col-span-4 flex flex-col min-h-0">
            <h2 class="text-xs bg-green-900/20 p-1 border border-green-900/50 inline-block w-fit mb-2">SHARD_INDEX</h2>
            <div id="manifest-list" class="manifest-scroll overflow-y-auto space-y-1 pr-2 terminal-border bg-black/20 p-2">
                <div class="text-[10px] opacity-40 animate-pulse p-4">AWAITING_SHARD_SELECTION...</div>
            </div>
        </section>

        <section id="detail-view" class="lg:col-span-8 flex flex-col min-h-0">
            <div id="km-placeholder" class="h-full border border-dashed border-green-900/30 flex items-center justify-center text-xs opacity-30 uppercase">
                Select_Record_From_Manifest
            </div>

            <div id="kill-report-target" class="terminal-border bg-black/40 p-6 hidden overflow-y-auto manifest-scroll">
                <div class="flex justify-between items-start border-b border-green-900/50 pb-4 mb-8">
                    <div>
                        <div id="km-system" class="text-2xl font-bold text-white tracking-widest uppercase">--</div>
                        <div id="km-region" class="text-[10px] opacity-50 uppercase">--</div>
                    </div>
                    <div class="text-right">
                        <div id="km-time" class="text-xs text-green-400">--</div>
                        <div id="km-value" class="text-xl font-bold text-white mt-1">--</div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                    <div class="space-y-4">
                        <span class="text-[10px] border border-green-700/50 bg-green-900/20 px-2 py-0.5">SUBJECT_INFO</span>
                        <div class="flex gap-4">
                            <img id="km-victim-portrait" src="" class="w-32 h-32 terminal-border victim-img bg-green-900/10">
                            <div>
                                <div id="km-victim-name" class="text-xl font-bold text-white leading-tight">--</div>
                                <div id="km-victim-corp" class="text-sm opacity-80">--</div>
                                <div id="km-victim-ship" class="text-green-400 font-bold mt-2 text-sm uppercase">--</div>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <span class="text-[10px] border border-red-700/50 bg-red-900/20 px-2 py-0.5 text-red-400">HOSTILE_ACTOR</span>
                        <div class="flex gap-4">
                            <img id="km-fb-portrait" src="" class="w-32 h-32 terminal-border grayscale bg-red-900/10">
                            <div>
                                <div id="km-fb-name" class="text-xl font-bold text-white leading-tight">--</div>
                                <div id="km-fb-corp" class="text-sm opacity-80">--</div>
                                <div id="km-fb-ship" class="text-red-400 font-bold mt-2 text-sm uppercase">--</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-12">
                    <div class="flex justify-between items-end border-b border-green-900/30 mb-4 pb-1">
                        <span class="text-[10px]">ENGAGEMENT_PARTICIPANTS</span>
                        <span id="km-count" class="text-[10px] opacity-50 uppercase">--</span>
                    </div>
                    <div id="km-attackers" class="grid grid-cols-2 md:grid-cols-4 gap-2">
                        </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const API_HOST = "https://ws.socketkill.com";

        // Set default date to today
        document.getElementById('date-picker').value = new Date().toISOString().slice(0, 10);

        async function fetchDailyLog() {
            const date = document.getElementById('date-picker').value;
            const list = document.getElementById('manifest-list');
            list.innerHTML = `<div class="text-[10px] animate-pulse p-4">ACCESSING_SHARD: ${date}...</div>`;

            try {
                const res = await fetch(`${API_HOST}/api/kills/${date}`);
                const data = await res.json();

                if (!data.kills || data.kills.length === 0) {
                    list.innerHTML = `<div class="text-[10px] text-red-500 p-4">NO_RECORDS_FOR_THIS_SHARD</div>`;
                    return;
                }

                list.innerHTML = data.kills.map(k => `
                    <div onclick="loadDetail(${k.killID})" class="p-2 border border-green-900/30 bg-green-900/5 hover:bg-green-900/20 cursor-pointer flex justify-between items-center transition-all group">
                        <div class="truncate">
                            <div class="text-[10px] text-white font-bold group-hover:text-green-400">${k.victim.ship}</div>
                            <div class="text-[8px] opacity-50 uppercase truncate w-32">${k.victim.name}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-[10px] font-bold text-green-400">${k.formattedValue}</div>
                            <div class="text-[8px] opacity-40 uppercase">${k.time.split('T')[1].slice(0, 5)} UTC</div>
                        </div>
                    </div>
                `).join('');

                document.getElementById('log-meta').innerText = `SHARD_SIZE: ${data.total} RECORDS // SHOWING: ${data.count}`;
            } catch (err) {
                list.innerHTML = `<div class="text-[10px] text-red-600 p-4">CRITICAL_SHARD_FAILURE</div>`;
            }
        }

        async function loadDetail(killID) {
            const target = document.getElementById('kill-report-target');
            const placeholder = document.getElementById('km-placeholder');
            
            placeholder.innerText = "PARSING_ENCRYPTED_STREAM...";
            
            try {
                const response = await fetch(`${API_HOST}/api/kill/${killID}`);
                const data = await response.json();
                
                placeholder.classList.add('hidden');
                target.classList.remove('hidden');

                document.getElementById('km-system').innerText = data.system.name;
                document.getElementById('km-region').innerText = `${data.system.region} // SEC: ${data.system.security.toFixed(1)}`;
                document.getElementById('km-time').innerText = data.killmailTime;
                document.getElementById('km-value').innerText = data.totalValue;

                document.getElementById('km-victim-portrait').src = `https://images.evetech.net/characters/${data.victim.characterID}/portrait?size=256`;
                document.getElementById('km-victim-name').innerText = data.victim.name;
                document.getElementById('km-victim-corp').innerText = data.victim.corp;
                document.getElementById('km-victim-ship').innerText = data.victim.ship;

                document.getElementById('km-fb-portrait').src = `https://images.evetech.net/characters/${data.finalBlow.characterID}/portrait?size=256`;
                document.getElementById('km-fb-name').innerText = data.finalBlow.name;
                document.getElementById('km-fb-corp').innerText = data.finalBlow.corp;
                document.getElementById('km-fb-ship').innerText = data.finalBlow.ship;

                document.getElementById('km-attackers').innerHTML = data.attackers.slice(0, 16).map(a => `
                    <div class="p-1 border border-green-900/20 bg-black text-[8px]">
                        <div class="text-white truncate font-bold">${a.name || 'Unknown'}</div>
                        <div class="text-red-500">${a.damagePercent}% DMG</div>
                    </div>
                `).join('');
                
                document.getElementById('km-count').innerText = `${data.attackerCount} AGGRESSORS`;
                target.scrollTop = 0;

            } catch (err) {
                placeholder.classList.remove('hidden');
                placeholder.innerText = "RETRIEVAL_ERROR";
                target.classList.add('hidden');
            }
        }

        // Auto-fetch on load
        fetchDailyLog();
    </script>
</body>
</html>
