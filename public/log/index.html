<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOCKET.KILL // ARCHIVE_DATA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap');
        
        body {
            background-color: #020202;
            color: #4ade80;
            font-family: 'Fira Code', monospace;
        }

        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 2px 100%;
            pointer-events: none;
            z-index: 50;
        }

        .terminal-border { border: 1px solid rgba(74, 222, 128, 0.2); }
        .victim-img { filter: sepia(100%) hue-rotate(60deg) brightness(80%) contrast(130%) grayscale(0.3); }
        
        .loading-shimmer {
            background: linear-gradient(90deg, transparent, rgba(74, 222, 128, 0.1), transparent);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="p-6">
    <div class="crt-overlay"></div>

    <header class="max-w-6xl mx-auto mb-10 flex justify-between items-end border-b border-green-900/40 pb-4">
        <div>
            <h1 class="text-xl font-bold tracking-widest text-white">RECORDS_ARCHIVE</h1>
            <p class="text-[10px] opacity-50 uppercase tracking-tighter">Secure Retrieval // Stateless Edge Architecture</p>
        </div>
        <div class="text-right">
            <div class="text-[10px] opacity-40">UTC_TIME</div>
            <div id="clock" class="text-xs">--:--:--</div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="mb-10 flex gap-2">
            <input type="text" id="kill-input" placeholder="ENTER_KILL_ID..." class="bg-black border border-green-900/50 px-4 py-2 text-xs w-64 focus:outline-none focus:border-green-400 text-green-400">
            <button onclick="manualLookup()" class="bg-green-900/20 border border-green-900/50 px-6 py-2 text-xs hover:bg-green-900/40 transition-colors">RETRIEVE</button>
        </div>

        <div id="report-container" class="hidden">
            <div class="terminal-border bg-green-900/5 p-8 relative overflow-hidden">
                <div id="shimmer-overlay" class="absolute inset-0 loading-shimmer opacity-0 pointer-events-none"></div>

                <div class="flex justify-between border-b border-green-900/50 pb-6 mb-8">
                    <div>
                        <div id="km-system" class="text-3xl font-bold text-white tracking-tighter uppercase">--</div>
                        <div id="km-region" class="text-xs opacity-50 italic">--</div>
                    </div>
                    <div class="text-right">
                        <div id="km-time" class="text-xs text-green-400 mb-1">--</div>
                        <div id="km-value" class="text-2xl font-bold text-white">--</div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-16">
                    <div class="space-y-4">
                        <div class="text-[10px] bg-green-900/30 px-2 py-0.5 border border-green-700/50 inline-block">LOSS_IDENTIFIED</div>
                        <div class="flex gap-6">
                            <img id="km-victim-portrait" src="" class="w-40 h-40 terminal-border victim-img">
                            <div class="flex flex-col justify-center">
                                <div id="km-victim-name" class="text-2xl font-bold text-white">--</div>
                                <div id="km-victim-corp" class="text-sm opacity-70">--</div>
                                <div id="km-victim-ship" class="text-green-400 font-bold mt-4 uppercase">--</div>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div class="text-[10px] bg-red-900/30 px-2 py-0.5 border border-red-700/50 text-red-400 inline-block">FINAL_BLOW_UNIT</div>
                        <div class="flex gap-6">
                            <img id="km-fb-portrait" src="" class="w-40 h-40 terminal-border grayscale">
                            <div class="flex flex-col justify-center">
                                <div id="km-fb-name" class="text-2xl font-bold text-white">--</div>
                                <div id="km-fb-corp" class="text-sm opacity-70">--</div>
                                <div id="km-fb-ship" class="text-red-400 font-bold mt-4 uppercase">--</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-16">
                    <div class="flex justify-between items-end border-b border-green-900/30 mb-6 pb-2">
                        <span class="text-[10px]">COMBAT_LOG_PARTICIPANTS</span>
                        <span id="km-count" class="text-[10px] opacity-40">--</span>
                    </div>
                    <div id="km-attackers" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                        </div>
                </div>
            </div>
        </div>

        <div id="error-msg" class="hidden text-red-600 border border-red-900/50 p-4 text-xs bg-red-900/10 uppercase animate-pulse">
            DATA_RETRIEVAL_FAILURE: RECORD_NOT_FOUND_IN_EDGE_SHARD
        </div>
    </main>

    <script>
        const API_BASE = "https://ws.socketkill.com";

        // Handle Manual Input
        function manualLookup() {
            const id = document.getElementById('kill-input').value;
            if (id) loadKillmail(id);
        }

        async function loadKillmail(killID) {
            const container = document.getElementById('report-container');
            const errorView = document.getElementById('error-msg');
            const shimmer = document.getElementById('shimmer-overlay');
            
            errorView.classList.add('hidden');
            container.classList.remove('hidden');
            shimmer.style.opacity = '1';

            try {
                // Jab your new databaseless API
                const response = await fetch(`${API_BASE}/api/kill/${killID}`);
                if (!response.ok) throw new Error('NOT_FOUND');
                
                const data = await response.json();
                
                // Hydrate Fields
                document.getElementById('km-system').innerText = data.system.name;
                document.getElementById('km-region').innerText = `${data.system.region} // SEC_STATUS: ${data.system.security.toFixed(1)}`;
                document.getElementById('km-time').innerText = data.killmailTime;
                document.getElementById('km-value').innerText = data.totalValue;

                document.getElementById('km-victim-portrait').src = `https://images.evetech.net/characters/${data.victim.characterID}/portrait?size=256`;
                document.getElementById('km-victim-name').innerText = data.victim.name;
                document.getElementById('km-victim-corp').innerText = data.victim.corp;
                document.getElementById('km-victim-ship').innerText = data.victim.ship;

                document.getElementById('km-fb-portrait').src = `https://images.evetech.net/characters/${data.finalBlow.characterID}/portrait?size=256`;
                document.getElementById('km-fb-name').innerText = data.finalBlow.name;
                document.getElementById('km-fb-corp').innerText = data.finalBlow.corp;
                document.getElementById('km-fb-ship').innerText = data.finalBlow.ship;

                const attackers = document.getElementById('km-attackers');
                attackers.innerHTML = data.attackers.slice(0, 18).map(a => `
                    <div class="p-2 border border-green-900/20 bg-black text-[9px] hover:border-green-400 transition-colors cursor-default">
                        <div class="text-white truncate font-bold">${a.name || 'Unknown'}</div>
                        <div class="opacity-50 truncate">${a.ship || 'Unknown Ship'}</div>
                        <div class="text-red-500 mt-1">${a.damagePercent}% DMG</div>
                    </div>
                `).join('');
                
                document.getElementById('km-count').innerText = `${data.attackerCount} UNITS RECORDED`;
                shimmer.style.opacity = '0';

            } catch (err) {
                container.classList.add('hidden');
                errorView.classList.remove('hidden');
            }
        }

        // Auto-load if URL contains ID (e.g. socketkill.com/archive?id=12345)
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (id) {
                document.getElementById('kill-input').value = id;
                loadKillmail(id);
            }
            
            // Simple clock
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toISOString().slice(11, 19) + " UTC";
            }, 1000);
        });
    </script>
</body>
</html>
