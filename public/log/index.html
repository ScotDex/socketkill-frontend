<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/log/style.css">
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "9a7b8334fd974f46a3b570cbc18d90b1"}'></script>
  <meta name="description" content="Daily killmail archive. Browse losses, ships, and ISK destroyed.">
  <meta name="keywords" content="eve online, eve, pvp, socket.kill, killboard, archived, eve tool, pvp tracker, gatekeeper, mmorpg, third party, socket, kill, eve killboard, eve pvp, eve wormhole, eve nullsec, eve lowsec, eve highsec, eve wormhole pvp">
  <meta name="author" content="Dexomus Viliana">


  <meta property="og:type" content="website">
  <meta property="og:url" content="https://socketkill.com">
  <meta property="og:title" content="Socket.Kill">
  <meta property="og:description" content="Daily killmail archive. Browse losses, ships, and ISK destroyed.">
  <meta property="og:image" content="https://socketkill.com/socket-preview-v1.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:type" content="image/png">

  <meta name="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://socketkill.com/">
  <meta property="twitter:title" content="Socket.Kill">
  <meta property="twitter:description" content="Daily killmail archive. Browse losses, ships, and ISK destroyed.">
  <meta name="twitter:image" content="https://socketkill.com/socket-preview-v1.png">

  <link rel="icon" type="image/png" href="https://edge.socketkill.com/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'eve-dark': '#0a0b0e',
            'eve-border': 'rgba(255, 255, 255, 0.1)',
            'eve-accent': '#00d4ff',
            'phosphor': '#3fb950',
          },
          fontFamily: {
            'mono': ['Share Tech Mono', 'monospace'],
            'exo': ['Exo 2', 'sans-serif'],
          },
        },
      },
    }
  </script>
</head>

<body class="min-h-screen">

  <!-- HEADER -->
  <header class="border-b border-eve-border bg-black/40 backdrop-blur-sm">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
      <h1 class="font-mono text-lg tracking-widest text-phosphor uppercase">
        <a href="/" class="hover:text-eve-accent transition-colors">SOCKET.KILL</a>
        <span class="text-gray-600 mx-2">//</span>
        <span class="text-white">LOG</span>
      </h1>
      <nav class="flex gap-4 text-[10px] tracking-widest text-gray-500 font-exo uppercase">
        <a href="/" class="hover:text-eve-accent">LIVE</a>
        <a href="/about/" class="hover:text-eve-accent">ABOUT</a>
      </nav>
    </div>
  </header>

    <!-- PAGINATION -->
  <section class="max-w-7xl mx-auto px-4 pb-8">
    <div class="flex items-center justify-between font-mono">
      <button id="prev-page"
              class="text-eve-accent border border-eve-border px-4 py-2 hover:bg-white/5 transition-colors text-sm tracking-widest disabled:opacity-30 disabled:cursor-not-allowed">
        &lt; NEWER
      </button>

      <div id="page-indicator" class="text-[10px] tracking-widest text-gray-500 uppercase">
        &gt; PAGE 1
      </div>

      <button id="next-page"
              class="text-eve-accent border border-eve-border px-4 py-2 hover:bg-white/5 transition-colors text-sm tracking-widest disabled:opacity-30 disabled:cursor-not-allowed">
        OLDER &gt;
      </button>
    </div>
  </section>

  <!-- DATE NAVIGATION -->
  <section class="max-w-7xl mx-auto px-4 pt-8 pb-4">
    <div class="flex items-center justify-between font-mono">
      <a id="prev-day" href="#"
         class="text-eve-accent border border-eve-border px-4 py-2 hover:bg-white/5 transition-colors text-sm tracking-widest">&lt; PREV DAY</a>

      <div class="text-center">
        <div class="text-[10px] tracking-widest text-gray-500 uppercase mb-1">VIEWING</div>
        <div id="current-date" class="text-2xl text-white tracking-widest">—</div>
        <div id="day-status" class="text-[10px] tracking-widest text-phosphor mt-1 uppercase">&gt; —</div>
      </div>

      <a id="next-day" href="#"
         class="text-eve-accent border border-eve-border px-4 py-2 hover:bg-white/5 transition-colors text-sm tracking-widest">NEXT DAY &gt;</a>
    </div>
  </section>

  <!-- KILL TABLE -->
  <main class="max-w-7xl mx-auto px-4 pb-4">
    <div class="tactical-frame bg-eve-dark p-4 mt-4">

      <!-- Status line -->
      <div class="flex justify-between items-center mb-4 text-[10px] tracking-widest text-gray-500 uppercase font-exo">
        <span>&gt; KILLMAILS // <span id="kill-count">0</span></span>
        <span id="status-text">&gt; LOADING</span>
      </div>

      <!-- Column headers -->
      <div class="hidden md:grid grid-cols-[40px_40px_60px_1fr_140px_60px_120px] gap-3 px-2 py-2 border-b border-eve-border text-[10px] tracking-widest text-gray-500 uppercase font-mono">
        <span></span>
        <span></span>
        <span>TIME</span>
        <span>VICTIM</span>
        <span>SYSTEM</span>
        <span class="text-right">ATTACKERS</span>
        <span class="text-right">ISK DESTROYED</span>
      </div>

      <!-- Rows go here -->
      <ul id="kill-list" class="divide-y divide-white/5">
        <li class="text-gray-500 italic text-sm font-mono p-4 text-center">&gt; LOADING...</li>
      </ul>

    </div>
  </main>



  <footer class="max-w-7xl mx-auto p-4 mt-8 border-t border-eve-border text-center">
    <div class="flex flex-col md:flex-row justify-between items-center gap-4 text-[10px] tracking-widest text-gray-500 font-exo">
      <div><a href="/" class="hover:text-eve-accent transition-colors">&lt; BACK TO LIVE FEED</a></div>
      <div class="space-x-4">
        <a href="https://socketkill.com/about/" class="hover:text-eve-accent">ABOUT</a>
        <a href="https://github.com/ScotDex/socketkill-frontend" target="_blank" class="hover:text-eve-accent">GITHUB</a>
        <a href="https://api.socketkill.com/docs/" class="hover:text-eve-accent">API</a>
        <a href="https://discord.gg/dpgmEm9REc" target="_blank" class="hover:text-eve-accent">DISCORD</a>
      </div>
      <div>&copy; 2026 SOCKETKILL.COM</div>
    </div>
  </footer>

  <script src="/log/log.js" type="module"></script>

</body>
</html>
