<!DOCTYPE html>
<html lang="en" class="bg-[#0a0a0f] text-[#ccc]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ['Share Tech Mono', 'monospace'] },
          colors: { phosphor: '#3fb950', 'phosphor-bright': '#00ff88' }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>Socket.Kill - About</title>
  <link rel="icon" type="image/png" href="https://edge.socketkill.com/favicon.png">
</head>

<body class="font-mono min-h-screen bg-[radial-gradient(ellipse_at_20%_50%,rgba(30,15,60,0.4),transparent_50%),radial-gradient(ellipse_at_80%_20%,rgba(10,30,60,0.4),transparent_45%)] bg-fixed">

  <header class="text-center py-12 border-b border-[#1a1a2e]">
    <h1 class="text-5xl text-phosphor-bright tracking-widest mb-4">SOCKET.KILL </h1>
    <p class="text-lg text-gray-500 mb-8">See yourself die in an atmospheric and aesthetically pleasing way.</p>
    <a href="https://socketkill.com" class="bg-phosphor-bright text-black px-10 py-3 font-bold tracking-widest hover:bg-green-500 transition">MAIN SITE</a>
    
    <div class="flex gap-8 justify-center mt-10 text-2xl">
      <a href="https://discord.gg/dpgmEm9REc" title="Discord" class="hover:text-phosphor-bright transition"><i class="fa-brands fa-discord"></i></a>
      <a href="https://twitter.com/scottishdex" title="X / Twitter" class="hover:text-phosphor-bright transition"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="https://github.com/ScotDex/socketkill-frontend" title="GitHub" class="hover:text-phosphor-bright transition"><i class="fa-brands fa-github"></i></a>
      <a href="https://angrygoldfish5.wordpress.com/" title="Wordpress" class="hover:text-phosphor-bright transition"><i class="fa-brands fa-wordpress"></i></a>
      <a href="https://twitch.tv/scottishdex" title="Twitch" class="hover:text-phosphor-bright transition"><i class="fa-brands fa-twitch"></i></a>
      <a href="https://youtube.com/@scottishdex" title="YouTube" class="hover:text-phosphor-bright transition"><i class="fa-brands fa-youtube"></i></a>
    </div>
  </header>

  <main class="max-w-2xl mx-auto p-6">
    <div id="ad-slot" class="my-8"></div>

    <section class="border-b border-[#1a1a2e] py-6">
      <h2 class="text-phosphor-bright text-lg tracking-[0.2em] uppercase mb-6">Frequently Asked Questions</h2>
      <div id="faq" class="flex flex-col gap-3">
        
        <script>
const faqData = [
    {
        q: "What is Socket.Kill?",
        a: "The design it optimized to produce killmails as fast as the internet allows, streamlining every aspect of the rendering process"
    },
    {
        q: "How is this different from zKill or Eve-Kill?",
        a: "Both contribute to historical records — stats, history, deep detailed information. Socket.Kill is a live feed. They're complementary tools, not competitors. Idea is to use both."
    },
    {
        q: "Where does the data come from?",
        a: "Squizz's recently developed R2 feed from zKillboard, which is utilized by multiple EVE killmail tools. Socket.Kill renders it differently."
    },
    {
        q: "Can I filter the feed?",
        a: "Yes. Type a corp, alliance, system, or region name and the feed filters to matching kills. Multi-mode — combine filters as needed."
    },
    {
        q: "What's with the green-on-black aesthetic?",
        a: "Well alot of interfaces opt for utility and re-useability, I thought I would go down a different route - the idea comes from fusing the alien franchise with eve online."
    },
    {
        q: "How do I support the project?",
        a: "[REWRITE WHEN GITHUB SPONSORS IS LIVE. For now, leave this question out or replace with a placeholder pointing to GitHub.]"
    },
    {
        q: "Who built this?",
        a: "Dexomus Viliana. EVE player, cloud infrastructure engineer. Contact me in game if you want."
    },
    {
        q: "Is there an API?",
        a: "Yes. Image proxy and kill data: <a href='https://api.socketkill.com/docs/' class='text-phosphor-bright underline'>api.socketkill.com/docs</a>. WebSocket access is whitelist-based — get in touch if you want to integrate."
    },
    {
        q: "Is this open source?",
        a: "The frontend is. <a href='https://github.com/ScotDex/socketkill-frontend' class='text-phosphor-bright underline'>github.com/ScotDex/socketkill-frontend</a>. I cannot permit back end open source yet, some corporations are sensitive..."
    }
];

          const faqContainer = document.getElementById('faq');
          faqData.forEach(item => {
            faqContainer.innerHTML += `
              <div class="accordion-item border border-[#1a1a2e] bg-[#0d0d14]">
                <button class="accordion-trigger w-full p-4 flex justify-between items-center text-left hover:text-phosphor-bright transition">
                  <span>${item.q}</span>
                  <span class="accordion-icon text-phosphor-bright text-xl">+</span>
                </button>
                <div class="accordion-content hidden px-4 pb-4 border-t border-[#1a1a2e] pt-4 text-lg text-gray-400">
                  <p>${item.a}</p>
                </div>
              </div>
            `;
          });
        </script>
      </div>
    </section>
  </main>

<footer class="max-w-7xl mx-auto p-4 mt-8 border-t border-eve-border text-center">
    <div class="flex flex-col md:flex-row justify-between items-center gap-4 text-[12px] tracking-widest text-gray-500 font-exo">
        <div>
            <a href="/" class="hover:text-eve-accent transition-colors">&lt; BACK TO SOCKETKILL.COM</a>
        </div>
        <div class="space-x-4">
            <a href="https://github.com/ScotDex/socketkill-frontend" target="_blank" class="hover:text-eve-accent">GITHUB</a>
            <a href="https://api.socketkill.com/docs/" class="hover:text-eve-accent">API</a>
            <a href="https://discord.gg/dpgmEm9REc" target="_blank" class="hover:text-eve-accent">DISCORD</a>
        </div>
        <div>
            &copy; 2026 SOCKETKILL.COM
        </div>
    </div>
</footer>

  <script>
    // Accordion Logic
    document.addEventListener('click', (e) => {
      if (e.target.closest('.accordion-trigger')) {
        const item = e.target.closest('.accordion-item');
        const content = item.querySelector('.accordion-content');
        document.querySelectorAll('.accordion-content').forEach(c => {
          if (c !== content) c.classList.add('hidden');
        });
        content.classList.toggle('hidden');
      }
    });

  </script>
</body>
</html>
