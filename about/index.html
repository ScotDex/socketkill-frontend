<!DOCTYPE html>
<html lang="en" class="bg-[#0a0a0f] text-[#ccc]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ['Share Tech Mono', 'monospace'] },
          colors: { phosphor: '#3fb950', 'phosphor-bright': '#00ff88' }
        }
      }
    }
  </script>
  <style>
    @keyframes filter-pulse {
      0%, 100% { box-shadow: 0 0 0 rgba(0, 255, 136, 0); border-color: #00ff88; }
      50% { box-shadow: 0 0 8px rgba(0, 255, 136, 0.4); border-color: rgba(0, 255, 136, 0.6); }
    }
    .animate-beta { animation: filter-pulse 2s ease-in-out infinite; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>Socket.Kill - About</title>
</head>

<body class="font-mono min-h-screen bg-[radial-gradient(ellipse_at_20%_50%,rgba(30,15,60,0.4),transparent_50%),radial-gradient(ellipse_at_80%_20%,rgba(10,30,60,0.4),transparent_45%)] bg-fixed">

  <header class="text-center py-12 border-b border-[#1a1a2e]">
    <h1 class="text-5xl text-phosphor-bright tracking-widest mb-4">SOCKET.KILL <span class="text-xs border border-phosphor-bright px-2 py-1 animate-beta">BETA</span></h1>
    <p class="text-lg text-gray-500 mb-8">Real-time EVE Online killmail streaming.</p>
    <a href="https://socketkill.com" class="bg-phosphor-bright text-black px-10 py-3 font-bold tracking-widest hover:bg-green-500 transition">MAIN SITE</a>
    
    <div class="flex gap-8 justify-center mt-10 text-2xl">
      <a href="https://discord.gg/dpgmEm9REc" title="Discord" class="hover:text-phosphor-bright transition"><i class="fa-brands fa-discord"></i></a>
      <a href="https://twitter.com/scottishdex" title="X / Twitter" class="hover:text-phosphor-bright transition"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="https://github.com/ScotDex/socketkill-frontend" title="GitHub" class="hover:text-phosphor-bright transition"><i class="fa-brands fa-github"></i></a>
      <a href="https://angrygoldfish5.wordpress.com/" title="Wordpress" class="hover:text-phosphor-bright transition"><i class="fa-brands fa-wordpress"></i></a>
      <a href="https://twitch.tv/scottishdex" title="Twitch" class="hover:text-phosphor-bright transition"><i class="fa-brands fa-twitch"></i></a>
      <a href="https://youtube.com/@scottishdex" title="YouTube" class="hover:text-phosphor-bright transition"><i class="fa-brands fa-youtube"></i></a>
      <a href="https://ko-fi.com/scottishdex" title="Support on Ko-fi" class="hover:text-phosphor-bright transition"><i class="fa-solid fa-mug-hot"></i></a>
    </div>
  </header>

  <main class="max-w-2xl mx-auto p-6">
    <div id="ad-slot" class="my-8"></div>

    <section class="border-b border-[#1a1a2e] py-6">
      <h2 class="text-phosphor-bright text-sm tracking-[0.2em] uppercase mb-6">Frequently Asked Questions</h2>
      <div id="faq" class="flex flex-col gap-3">
        
        <script>
          const faqData = [
            { q: "What is Socket.Kill?", a: "Socket.Kill is a real-time EVE Online killmail streaming platform. It processes kills as they happen and broadcasts them live via WebSocket — lower latency than traditional killboards." },
            { q: "How is it different from zkillboard?", a: "The data comes from Squizz's newly developed R2 bucket feature, but the platform is designed to simply render and stream killmails as fast as possible, zkillboard's area is stats and history." },
            { q: "Can I filter by system as well as region?", a: "Yes the filter matches against system names also. Type any system name and the feed will filter to kills in that system." },
            { q: "Why the cool animations and visuals?", a: "When I was young, I always loved the alien franchise and all existing tools out there often opt for utility and usefulness, so I decided to go down the road of atmosphere and aesthetics and why not my favourite kind!" },
            { q: "How do I support the project?", a: "There is a link at the top which gives you the opportunity to support the page by paying a whole pound per month..." },
            { q: "Who is responsible for this witchcraft?", a: "Socket.Kill was built and is maintained by Dexomus Viliana — an EVE Online player and cloud infrastructure engineer. Get in touch at dev@socketkill.com." },
            { q: "Where is the API Documentation?", a: "Visit <a href='https://api.socketkill.com/docs/' class='text-phosphor-bright underline'>api.socketkill.com/docs</a> for the full API reference." },
            { q: "I have an idea, can I write it out on a feedback form?", a: "Yes, I put together a rudimentary Google feedback form. <a href='https://docs.google.com/forms/d/e/1FAIpQLSe7hmRVq9Fz2ThbuhgTJyBFN2qGJKzdIhgFbTUeINWpS6KEuw/viewform?pli=1' class='text-phosphor-bright underline'>fill it out here</a>." },
            { q: "Is this open source?", a: "Yes the GitHub icon at the top will take you to all 1300 lines of CSS that make the visuals possible." }
          ];

          const faqContainer = document.getElementById('faq');
          faqData.forEach(item => {
            faqContainer.innerHTML += `
              <div class="accordion-item border border-[#1a1a2e] bg-[#0d0d14]">
                <button class="accordion-trigger w-full p-4 flex justify-between items-center text-left hover:text-phosphor-bright transition">
                  <span>${item.q}</span>
                  <span class="accordion-icon text-phosphor-bright text-xl">+</span>
                </button>
                <div class="accordion-content hidden px-4 pb-4 border-t border-[#1a1a2e] pt-4 text-xs text-gray-400">
                  <p>${item.a}</p>
                </div>
              </div>
            `;
          });
        </script>
      </div>
    </section>
  </main>

  <footer class="text-center py-8 text-gray-700 text-sm tracking-widest">
    © 2026 DEXOMUS VILIANA // SCOTTISHDEX
  </footer>

  <script>
    // Accordion Logic
    document.addEventListener('click', (e) => {
      if (e.target.closest('.accordion-trigger')) {
        const item = e.target.closest('.accordion-item');
        const content = item.querySelector('.accordion-content');
        document.querySelectorAll('.accordion-content').forEach(c => {
          if (c !== content) c.classList.add('hidden');
        });
        content.classList.toggle('hidden');
      }
    });

    // Ad Logic
    const ads = [
      { img: 'https://edge.socketkill.com/friend.jpg', title: 'START YOUR EVE JOURNEY', text: 'New player? Get 1,000,000 skill points free', cta: 'CLAIM BONUS', url: 'https://www.eveonline.com/signup?invc=e32ca441-aa95-4eb7-ad06-d2c6334a5872' },
      { img: 'https://web-platforms.sfo2.cdn.digitaloceanspaces.com/WWW/Badge%201.svg', title: 'DIGITAL OCEAN HOSTING', text: '$200 credit for new accounts', cta: 'GET CREDIT', url: 'https://www.digitalocean.com/?refcode=1808909b79cf' },
      { img: 'https://edge.socketkill.com/NoD_Stacked_White.png', title: 'DO YOU STREAM?', text: 'Discounts Available', cta: 'GET DEAL', url: 'https://nerdordie.com/shop/ref/kps2mr/' },
      { img: 'https://storage.ko-fi.com/cdn/brandasset/v2/support_me_on_kofi_dark.png', title: 'SUPPORT SOCKETKILL', text: 'Help keep these tools free', cta: 'DONATE', url: 'https://ko-fi.com/scottishdex' }
    ];

    let currentAd = 0;
    function renderAd() {
      const ad = ads[currentAd];
      document.getElementById('ad-slot').innerHTML = `
        <div class="flex items-center gap-6 bg-[#0d0d14] border border-[#1a1a2e] p-5">
          <img src="${ad.img}" class="w-16 h-auto" alt="${ad.title}">
          <div class="flex-grow">
            <h3 class="text-phosphor-bright text-xs tracking-widest mb-1">${ad.title}</h3>
            <p class="text-gray-500 text-xs">${ad.text}</p>
          </div>
          <a href="${ad.url}" target="_blank" class="border border-phosphor-bright text-phosphor-bright px-4 py-2 text-xs hover:bg-phosphor-bright hover:text-black transition">
            ${ad.cta}
          </a>
        </div>
      `;
    }
    renderAd();
    setInterval(() => { currentAd = (currentAd + 1) % ads.length; renderAd(); }, 15000);
  </script>
</body>
</html>
