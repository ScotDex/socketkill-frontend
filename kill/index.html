<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Killmail // Socket.Kill</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css"> <link rel="stylesheet" href="/kill/base.css"> </head>
<body class="killmail-view">
    <div class="fog-overlay"></div>

    <div class="kill-container">
        <main class="kill-grid">

            <section class="zone-pilot" aria-label="Pilot Identification">
                <div class="pilot-card">
                    <div class="panel-header">
                        <span>PILOT IDENTIFICATION</span>
                        <span class="status-tag">RECORD ARCHIVED</span>
                    </div>
                    <div class="pilot-main">
                        <div class="pilot-portrait">
                            <img id="pilot-portrait-img" src="" alt="Pilot">
                        </div>
                        <div class="pilot-meta">
                            <div id="pilot-name" class="pilot-name">—</div>
                            <div class="pilot-corp-row">
                                <img id="pilot-crest-img" src="" class="mini-crest">
                                <div id="pilot-corp" class="pilot-corp">—</div>
                            </div>
                            <div id="pilot-alliance" class="pilot-alliance">UNAFFILIATED</div>
                        </div>
                    </div>
                    <div class="panel-footer">> STATUS: KIA</div>
                </div>
            </section>

            <section class="zone-ship" aria-label="Vessel Destruction">
                <div class="ship-panel">
                    <div class="panel-header">
                        <span>VESSEL DESTROYED</span>
                        <span class="status-tag">WRECKAGE SCANNED</span>
                    </div>
                    <div class="ship-render-wrap">
                        <img id="ship-render-img" src="" alt="Vessel">
                        <div class="ship-render-overlay"></div>
                    </div>
                    <div class="ship-info-block">
                        <div id="ship-name" class="ship-name-display">—</div>
                        <div id="ship-value" class="ship-value-display">—</div>
                    </div>
                </div>

                <div class="fit-panel">
                    <div class="section-sub-header">> WRECKAGE RECOVERED</div>
                    <div class="fit-pending-msg">> ITEM ANALYSIS PENDING</div>
                </div>
            </section>

            <section class="zone-intel" aria-label="Combat Intel">
                <div class="intel-panel">
                    <div class="panel-header">> RECOVERED FOOTAGE</div>
                    <div class="replay-slot" id="replay-slot">
                        <div class="pending-glow">AWAITING FEED...</div>
                    </div>
                </div>

                <div class="attackers-panel">
                    <div class="panel-header">
                        <span>HOSTILE SIGNATURES</span>
                        <span id="attacker-count" class="count-badge">0</span>
                    </div>
                    <ul class="attacker-list" id="attacker-list"></ul>
                    <button class="attacker-expand" id="attacker-expand" hidden>
                        SHOW <span id="attacker-expand-count">0</span> MORE
                    </button>
                </div>
            </section>

        </main>
    </div>

    <script src="/kill/kill.js"></script>
</body>
</html>
