<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Socket.Kill — Status</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #3fb950;
            --mono: 'Share Tech Mono', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: var(--mono);
            padding: 40px 20px;
            min-height: 100vh;
        }
        header {
            border-bottom: 1px solid rgba(63, 185, 80, 0.3);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
        h1 {
            color: var(--green);
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-shadow: 0 0 8px rgba(63, 185, 80, 0.6);
        }
        .subtitle {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 2px;
            margin-top: 4px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1rem;
            max-width: 1000px;
        }
        .card {
            border: 1px solid rgba(63, 185, 80, 0.2);
            background: rgba(10, 12, 16, 0.9);
            padding: 1.2rem;
        }
        .card-title {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            border-bottom: 1px solid rgba(63, 185, 80, 0.1);
            padding-bottom: 0.5rem;
        }
        .stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            font-size: 0.8rem;
        }
        .stat-label {
            color: rgba(255,255,255,0.4);
            letter-spacing: 1px;
        }
        .stat-value {
            color: var(--green);
            text-shadow: 0 0 4px rgba(63, 185, 80, 0.4);
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
        }
        #last-updated {
            color: rgba(63, 185, 80, 0.5);
        }
    </style>
</head>
<body>
    <header>
        <h1>SOCKET.KILL // STATUS</h1>
        <div class="subtitle">SYSTEM MONITOR — LIVE DATA</div>
    </header>

    <div class="grid">
        <div class="card">
            <div class="card-title">Feed</div>
            <div class="stat">
                <span class="stat-label">KILLS PROCESSED</span>
                <span class="stat-value" id="totalScanned">—</span>
            </div>
            <div class="stat">
                <span class="stat-label">ISK DESTROYED</span>
                <span class="stat-value" id="totalIsk">—</span>
            </div>
            <div class="stat">
                <span class="stat-label">CONNECTIONS</span>
                <span class="stat-value" id="connections">—</span>
            </div>
            <div class="stat">
                <span class="stat-label">UPTIME</span>
                <span class="stat-value" id="uptime">—</span>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Cache</div>
            <div class="stat">
                <span class="stat-label">CHARACTERS</span>
                <span class="stat-value" id="cacheCharacters">—</span>
            </div>
            <div class="stat">
                <span class="stat-label">CORPORATIONS</span>
                <span class="stat-value" id="cacheCorporations">—</span>
            </div>
            <div class="stat">
                <span class="stat-label">TYPES</span>
                <span class="stat-value" id="cacheTypes">—</span>
            </div>
            <div class="stat">
                <span class="stat-label">REGIONS</span>
                <span class="stat-value" id="cacheRegions">—</span>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Memory</div>
            <div class="stat">
                <span class="stat-label">RSS</span>
                <span class="stat-value" id="rss">—</span>
            </div>
            <div class="stat">
                <span class="stat-label">HEAP USED</span>
                <span class="stat-value" id="heapUsed">—</span>
            </div>
            <div class="stat">
                <span class="stat-label">HEAP TOTAL</span>
                <span class="stat-value" id="heapTotal">—</span>
            </div>
        </div>
    </div>

    <div class="footer">
        LAST UPDATED: <span id="last-updated">—</span> // REFRESHES EVERY 30S
    </div>

    <script>
        function formatIsk(value) {
            if (value >= 1e12) return (value / 1e12).toFixed(2) + 'T';
            if (value >= 1e9) return (value / 1e9).toFixed(2) + 'B';
            if (value >= 1e6) return (value / 1e6).toFixed(2) + 'M';
            return value.toLocaleString();
        }

        function formatUptime(seconds) {
            const d = Math.floor(seconds / 86400);
            const h = Math.floor((seconds % 86400) / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            return `${d}d ${h}h ${m}m`;
        }

        async function fetchStats() {
            try {
                const res = await fetch('https://ws.socketkill.com/api/stats');
                const data = await res.json();

                document.getElementById('totalScanned').innerText = data.totalScanned.toLocaleString();
                document.getElementById('totalIsk').innerText = formatIsk(data.totalIsk);
                document.getElementById('connections').innerText = data.connections;
                document.getElementById('uptime').innerText = formatUptime(data.uptime);
                document.getElementById('cacheCharacters').innerText = data.cache.characters.toLocaleString();
                document.getElementById('cacheCorporations').innerText = data.cache.corporations.toLocaleString();
                document.getElementById('cacheTypes').innerText = data.cache.types.toLocaleString();
                document.getElementById('cacheRegions').innerText = data.cache.regions.toLocaleString();
                document.getElementById('rss').innerText = data.memory.rss + ' MB';
                document.getElementById('heapUsed').innerText = data.memory.heapUsed + ' MB';
                document.getElementById('heapTotal').innerText = data.memory.heapTotal + ' MB';
                document.getElementById('last-updated').innerText = new Date().toUTCString();
            } catch (err) {
                document.getElementById('last-updated').innerText = 'FETCH FAILED';
            }
        }

        fetchStats();
        setInterval(fetchStats, 30000);
    </script>
</body>
</html>
